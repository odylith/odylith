  <style>
    :root {
      --bg-a: #f0f9ff;
      --bg-b: #ecfeff;
      --ink: #0b1324;
      --ink-soft: #334155;
      --ink-muted: #64748b;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #c7d2fe;
      --line-strong: #94a3b8;
      --brand: #0f766e;
      --brand-2: #1d4ed8;
      --warn: #b45309;
      --ok: #166534;
      --focus: #2563eb;
      --muted: #64748b;
      --danger: #b42318;
      --warn-bg: #fff7e8;
      --warn-line: #f0d2a8;
      --action-border: #b9c7db;
      --action-bg: #f3f6fb;
      --action-text: #334155;
      --action-border-hover: #9aaec9;
      --action-bg-hover: #e8eef7;
      --action-text-hover: #1e293b;

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 8% -10%, #dbeafe 0%, transparent 42%),
        radial-gradient(circle at 94% 0%, #ccfbf1 0%, transparent 38%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b));
    }
    html, body {
  font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink, #0b1324);
}
    :root {
  --surface-shell-max-width: 1320px;
  --surface-identifier-font-size: 14px;
  --surface-identifier-font-weight: 500;
  --surface-identifier-chip-padding: 2px 10px;
  --surface-workstream-button-font-size: 12px;
  --surface-workstream-button-font-weight: 500;
  --surface-workstream-button-padding: 1px 8px;
  --surface-deep-link-button-font-size: 11px;
  --surface-deep-link-button-font-weight: 700;
  --surface-deep-link-button-padding: 4px 12px;
}
    .shell {
  max-width: var(--surface-shell-max-width, 1320px);
  margin: 0 auto;
  padding: 22px 18px 34px;
  display: grid;
  gap: 12px;
}
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      min-width: 0;
    }
    .registry-hero {
  background: linear-gradient(145deg, #ffffff, #ecfeff 58%, #eff6ff);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px 18px 14px;
  box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
  display: grid;
  gap: 10px;
  margin-bottom: 0;
}
    .hero-overline {
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: #0b7f77;
  font-size: 12px;
  font-weight: 700;
  margin: 0 0 6px;
}

.registry-title {
  margin: 0 0 8px;
  font-size: 31px;
  line-height: 1.08;
  letter-spacing: -0.01em;
  font-weight: 700;
}

.registry-subtitle {
  margin: 0;
  color: var(--ink-soft, #334155);
  max-width: 100%;
  line-height: 1.5;
  font-size: 14px;
  font-weight: 400;
  white-space: nowrap;
}

@media (max-width: 760px) {
  .registry-title {
    font-size: 22px;
  }
  .registry-subtitle {
    font-size: 13px;
  }
  .registry-subtitle {
    white-space: normal;
  }
}
    .registry-filters-shell {
  display: grid;
  gap: 8px;
  position: sticky;
  top: 10px;
  z-index: 24;
}
    .registry-controls {
  position: sticky;
  top: 10px;
  z-index: 20;
  display: grid;
  grid-template-columns: minmax(260px, 1.35fr) minmax(180px, 1fr) minmax(190px, 1fr) auto;
  gap: 8px;
  padding: 10px;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid #bfdbfe;
  border-radius: 14px;
  backdrop-filter: blur(8px);
  margin-bottom: 12px;
  box-shadow: 0 4px 14px rgba(15, 23, 42, 0.07);
}

.registry-controls input, .registry-controls select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  background: #fff;
  color: var(--ink, #0b1324);
  font-size: 14px;
}

.registry-controls input:focus, .registry-controls select:focus {
  outline: 2px solid #bfdbfe;
  border-color: var(--focus, #2563eb);
}
    .registry-controls {
      position: static;
      top: auto;
    }
    .registry-control {
      display: grid;
      gap: 5px;
      min-width: 0;
    }
    .registry-control-reset {
      display: grid;
      gap: 5px;
      width: fit-content;
      justify-self: end;
      align-self: end;
    }
    .kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin-top: 0;
}
    .kpi-card {
  border: 1px solid #dbeafe;
  border-radius: 12px;
  background: #ffffff;
  padding: 10px 12px;
  min-height: 0;
  display: grid;
  grid-template-rows: 2.35em auto;
  align-content: start;
}
    .kpi-label {
  margin: 0;
  color: var(--ink-muted, #64748b);
  font-size: 12px;
  line-height: 1.15;
  letter-spacing: 0.06em;
  font-weight: 400;
  text-transform: uppercase;
  display: flex;
  align-items: flex-start;
}

.kpi-value {
  margin: 4px 0 0;
  color: var(--ink, #0b1324);
  font-size: 23px;
  line-height: 1;
  letter-spacing: -0.01em;
  font-weight: 700;
}
    .kpi-card.warn .kpi-label,
    .kpi-card.warn .kpi-value {
      color: var(--danger);
    }
    .workspace {
  display: grid;
  grid-template-columns: minmax(330px, 420px) minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}
    .list-panel,
    .detail-panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      min-width: 0;
    }
    .list-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      max-height: calc(100vh - 188px);
      overflow: hidden;
    }
    .label {
  --label-bg: #f6faf7;
  --label-border: #d6e2da;
  --label-text: #334155;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--label-border);
  border-radius: 4px;
  min-height: 0px;
  padding: 4px 10px;
  color: var(--label-text);
  background: var(--label-bg);
  box-shadow: none;
  text-decoration: none;
  white-space: nowrap;
  vertical-align: middle;
  cursor: default;
}
    .label {
  color: #334155;
  font-size: 11px;
  line-height: 1;
  letter-spacing: 0.01em;
  font-weight: 700;
  text-transform: none;
}
    .label.warn {
  --label-bg: #f8efe2;
  --label-border: #ead3b6;
  --label-text: #8a6137;
}
    .action-chip {
      --action-border: #b9c7db;
      --action-bg: #f3f6fb;
      --action-text: #334155;
      --action-border-hover: #9aaec9;
      --action-bg-hover: #e8eef7;
      --action-text-hover: #1e293b;
    }
    .action-chip {
  --chip-link-border: var(--action-border);
  --chip-link-bg: var(--action-bg);
  --chip-link-text: var(--action-text);
  --chip-link-border-hover: var(--action-border-hover);
  --chip-link-bg-hover: var(--action-bg-hover);
  --chip-link-text-hover: var(--action-text-hover);
  appearance: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 0px;
  padding: var(--surface-deep-link-button-padding, 4px 12px);
  border-radius: 999px;
  border: 1px solid var(--chip-link-border);
  background: var(--chip-link-bg);
  color: var(--chip-link-text);
  box-shadow: none;
  white-space: nowrap;
  vertical-align: middle;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
}

.action-chip:hover,
.action-chip:focus-visible {
  border-color: var(--chip-link-border-hover);
  background: var(--chip-link-bg-hover);
  color: var(--chip-link-text-hover);
}

.action-chip:focus-visible {
  outline: 2px solid #bfdbfe;
  outline-offset: 1px;
}

.action-chip {
  font-family: inherit;
  color: var(--action-text);
  font-size: var(--surface-deep-link-button-font-size, 11px);
  line-height: 1;
  letter-spacing: 0.01em;
  font-weight: var(--surface-deep-link-button-font-weight, 700);
  text-transform: none;
}
    .action-chip.active {
      border-color: #1d4a8f;
      background: #deebff;
      color: #1d4ed8;
    }
    .detail-action-chip {
  --chip-link-border: #b9c7db;
  --chip-link-bg: #f3f6fb;
  --chip-link-text: var(--chip-link-text);
  --chip-link-border-hover: #9aaec9;
  --chip-link-bg-hover: #e8eef7;
  --chip-link-text-hover: #1e293b;
  appearance: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 0px;
  padding: var(--surface-deep-link-button-padding, 4px 12px);
  border-radius: 999px;
  border: 1px solid var(--chip-link-border);
  background: var(--chip-link-bg);
  color: var(--chip-link-text);
  box-shadow: none;
  white-space: nowrap;
  vertical-align: middle;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
}

.detail-action-chip:hover,
.detail-action-chip:focus-visible {
  border-color: var(--chip-link-border-hover);
  background: var(--chip-link-bg-hover);
  color: var(--chip-link-text-hover);
}

.detail-action-chip:focus-visible {
  outline: 2px solid #bfdbfe;
  outline-offset: 1px;
}

.detail-action-chip {
  font-family: inherit;
  color: var(--chip-link-text);
  font-size: var(--surface-deep-link-button-font-size, 11px);
  line-height: 1;
  letter-spacing: 0.01em;
  font-weight: var(--surface-deep-link-button-font-weight, 700);
  text-transform: none;
}
    
    .detail-action-chip.tone-gov {
  --chip-link-border: #8cb8f4;
  --chip-link-bg: #eaf3ff;
  --chip-link-text: #1f4795;
  --chip-link-border-hover: #68a0eb;
  --chip-link-bg-hover: #deebff;
  --chip-link-text-hover: #1d4ed8;
}

.detail-action-chip.tone-infra {
  --chip-link-border: #7ddfd4;
  --chip-link-bg: #e6fbf7;
  --chip-link-text: #0f766e;

  --chip-link-bg-hover: #d8f7f1;

}

.detail-action-chip.tone-data {
  --chip-link-border: #c8a4f8;
  --chip-link-bg: #f4ecff;
  --chip-link-text: #7e22ce;
  --chip-link-border-hover: #b889f3;
  --chip-link-bg-hover: #eddfff;
  --chip-link-text-hover: #7e22ce;
}

.detail-action-chip.tone-engine {
  --chip-link-border: #f3bf84;
  --chip-link-bg: #fff3e2;
  --chip-link-text: #b45309;
  --chip-link-border-hover: #eeaa63;
  --chip-link-bg-hover: #ffeacf;
  --chip-link-text-hover: #b45309;
}
    .tone-gov {
      --action-border: #8cb8f4;
      --action-bg: #eaf3ff;
      --action-text: #1f4795;
      --action-border-hover: #68a0eb;
      --action-bg-hover: #deebff;
      --action-text-hover: #1d4ed8;
    }
    .tone-infra {
      --action-border: #7ddfd4;
      --action-bg: #e6fbf7;
      --action-text: #0f766e;

      --action-bg-hover: #d8f7f1;
      --action-text-hover: #0f766e;
    }
    .tone-data {
      --action-border: #c8a4f8;

    }
    .tone-engine {
      --action-border: #f3bf84;
      --action-bg: #fff3e2;
      --action-text: #b45309;
      --action-border-hover: #eeaa63;

    }
    .pane-head {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .pane-head {
  margin: 0;
  color: #2a5078;
  font-size: 13px;
  line-height: 1.2;
  letter-spacing: 0.045em;
  font-weight: 700;
  text-transform: uppercase;
}

.group-head {
  margin: 0;
  color: #547196;
  font-size: 11px;
  line-height: 1.2;
  letter-spacing: 0.07em;

  text-transform: uppercase;
}

.component-card-title {
  margin: 0;
  color: #28496d;

  text-transform: none;
}

.detail-disclosure-title {
  margin: 0;

}

.component-meta {

.context-count {
  margin: 0;

  font-size: 13px;

}

.summary-row {

  text-transform: none;
}
    .search,
    .select {
      min-height: 38px;
      line-height: 1;
    }
    .select {
      font-weight: 700;
      color: #20456b;
    }
    .control-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #49678b;
  font-weight: 700;
  line-height: 1;
}
    .component-list {
      margin: 0;

      padding: 12px;
      max-height: none;
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 10px;

    }
    .list-spacer {

    }

    }

  margin: 8px 0 4px;

  }

    .component-meta {
      margin: 0;
    }
    .inline {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .component-btn .label {
      padding: 4px 7px;
    }

    }

    }

(function enforceShellOwnedSurfaceAccessInline() {
  try {
    const expectedFrameId = "frame-registry";
    const frameElement = window.frameElement;
    const actualFrameId = frameElement && typeof frameElement.id === "string" ? frameElement.id : "";
    if (window.parent && window.parent !== window && actualFrameId === expectedFrameId) {
      return;
    }
    const shellUrl = new URL("../index.html", window.location.href);
    const currentParams = new URLSearchParams(window.location.search || "");
    const nextParams = new URLSearchParams();
    nextParams.set("tab", "registry");
    const passthroughRules = [{"target":"component","sources":["component"]}];
    for (const rule of passthroughRules) {
      if (!rule || !rule.target) continue;
      const sources = Array.isArray(rule.sources) && rule.sources.length ? rule.sources : [rule.target];
      let selected = "";
      for (const sourceKey of sources) {
        const token = String(currentParams.get(sourceKey) || "").trim();
        if (token) {
          selected = token;
          break;
        }
      }
      if (selected) {
        nextParams.set(rule.target, selected);
      }
    }
    shellUrl.search = nextParams.toString() ? `?${nextParams.toString()}` : "";
    shellUrl.hash = "";
    if (window.__ODYLITH_SHELL_REDIRECTING__ === true && window.__ODYLITH_SHELL_REDIRECT_TARGET__ === shellUrl.toString()) {
      return;
    }
    const targetWindow = window.top && window.top !== window ? window.top : window;
    if (targetWindow.location && targetWindow.location.href === shellUrl.toString()) {
      return;
    }
    window.__ODYLITH_SHELL_REDIRECTING__ = true;
    window.__ODYLITH_SHELL_REDIRECT_TARGET__ = shellUrl.toString();
    if (typeof window.stop === "function") {
      window.stop();
    }
    targetWindow.location.replace(shellUrl.toString());

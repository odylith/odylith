name: release-candidate

on:
  pull_request:
  workflow_dispatch:

jobs:
  candidate-proof:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Validate commit identities
        run: python scripts/validate_git_identity.py history --repo-root . HEAD
      - name: Install Hatch
        run: python -m pip install --upgrade virtualenv==20.31.1 hatch==1.14.1
      - name: Sync Hatch environment
        run: hatch env create
      - name: Repair repo-local runtime bootstrap
        run: hatch run python -m odylith.cli doctor --repo-root . --repair
      - name: Show lane status
        continue-on-error: true
        run: make lane-show
      - name: Run release candidate proof
        run: make release-candidate

name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag like v0.1.0
        required: true
        type: string
      expected_sha:
        description: Commit SHA reserved by the local maintainer release session
        required: true
        type: string

jobs:
  build-and-upload:
    runs-on: ubuntu-24.04
    env:
      ODYLITH_RELEASE_REPO: freedom-research/odylith
      ODYLITH_RELEASE_ACTOR: freedom-research
      ODYLITH_RELEASE_REF: refs/heads/main
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Authorize canonical release owner
        run: |
          if [[ "${GITHUB_REPOSITORY}" != "${ODYLITH_RELEASE_REPO}" ]]; then
            echo "canonical releases are only allowed from ${ODYLITH_RELEASE_REPO}; got ${GITHUB_REPOSITORY}" >&2
            exit 2
          fi
          if [[ "${GITHUB_ACTOR}" != "${ODYLITH_RELEASE_ACTOR}" ]]; then
            echo "canonical releases are only allowed for GitHub actor ${ODYLITH_RELEASE_ACTOR}; got ${GITHUB_ACTOR}" >&2
            exit 2
          fi
          if [[ "${GITHUB_REF}" != "${ODYLITH_RELEASE_REF}" ]]; then
            echo "canonical releases must run from ${ODYLITH_RELEASE_REF}; got ${GITHUB_REF}" >&2
            exit 2
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release tag and commit binding
        run: |
          git fetch --tags origin
          tag_sha="$(git rev-parse "${{ inputs.tag }}^{commit}")"
          if [[ "${GITHUB_SHA}" != "${{ inputs.expected_sha }}" ]]; then
            echo "workflow dispatch commit mismatch: expected ${{ inputs.expected_sha }} got ${GITHUB_SHA}" >&2
            exit 2
          fi
          if [[ "${tag_sha}" != "${{ inputs.expected_sha }}" ]]; then
            echo "release tag ${{ inputs.tag }} points to ${tag_sha}, expected ${{ inputs.expected_sha }}" >&2
            exit 2
          fi
      - name: Validate commit identities
        run: python scripts/validate_git_identity.py history --repo-root . HEAD
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Install Hatch
        run: python -m pip install --upgrade hatch==1.14.1
      - name: Sync Hatch environment
        run: hatch env create
      - name: Validate self-host release posture
        run: hatch run python -m odylith.cli validate self-host-posture --repo-root . --mode release --expected-tag "${{ inputs.tag }}"
      - name: Build wheels
        run: |
          hatch build
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.tag }}" --repo "${ODYLITH_RELEASE_REPO}" --title "${{ inputs.tag }}" --notes "Odylith release ${{ inputs.tag }}" || true
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: hatch run python scripts/release/publish_release_assets.py --repo "${ODYLITH_RELEASE_REPO}" --tag "${{ inputs.tag }}" --dist-dir dist --upload
